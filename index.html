<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Temporada Mundial — Frutas y Verduras de Temporada en el Mundo</title>
<meta name="description" content="Descubre qué frutas y verduras están en temporada en cada país del mundo, mes a mes. Guía visual interactiva basada en datos agrícolas globales."/>
<meta name="keywords" content="frutas de temporada, verduras de temporada, alimentos de temporada, estacionalidad, agricultura mundial, calendario frutas, calendario verduras"/>
<meta property="og:title" content="Temporada Mundial — Frutas y Verduras de Temporada"/>
<meta property="og:description" content="Globo interactivo: descubre qué alimentos están en temporada en cualquier país del mundo."/>
<meta property="og:type" content="website"/>
<meta name="robots" content="index, follow"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --green-dark:#1a5c2e;--green-mid:#2d8a47;--green-light:#5ab870;
    --red-pale:#f5c6cb;--bg:#0a0f0d;--surface:#111a14;
    --border:rgba(255,255,255,0.08);--text:#e8f5ea;--muted:#7aab84;--accent:#4caf72;
  }
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
  #app{display:flex;flex-direction:column;height:100vh}
  #topbar{display:flex;align-items:center;gap:20px;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;z-index:10}
  #logo{font-size:16px;font-weight:700;color:var(--accent);white-space:nowrap}
  #logo span{color:var(--muted);font-weight:400;font-size:13px;margin-left:4px}
  #slider-wrap{display:flex;align-items:center;gap:12px;flex:1;min-width:200px;max-width:500px}
  #slider-wrap label{font-size:12px;color:var(--muted);white-space:nowrap}
  #monthSlider{flex:1;-webkit-appearance:none;height:3px;border-radius:2px;background:var(--border);outline:none;cursor:pointer}
  #monthSlider::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);cursor:pointer}
  #monthLabel{font-size:14px;font-weight:600;color:var(--text);min-width:80px}
  .filters{display:flex;gap:6px}
  .filter-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;transition:.15s}
  .filter-btn:hover,.filter-btn.active{background:var(--green-dark);border-color:var(--green-mid);color:var(--text)}
  #lang-toggle{display:flex;gap:0;border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-left:4px}
  .lang-btn{background:transparent;border:none;color:var(--muted);padding:4px 10px;font-size:12px;cursor:pointer;transition:.15s;font-weight:500}
  .lang-btn.active{background:var(--green-dark);color:var(--text)}
  #main{display:flex;flex:1;overflow:hidden;position:relative}
  #globeEl{flex:1;min-width:0}
  #panel{width:260px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  #panel-head{padding:16px;border-bottom:1px solid var(--border)}
  #panel-country{font-size:16px;font-weight:600;color:var(--text);margin-bottom:2px}
  #panel-count{font-size:12px;color:var(--muted)}
  #panel-body{flex:1;overflow-y:auto;padding:8px 0}
  #panel-body::-webkit-scrollbar{width:4px}
  #panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  .product-row{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--border)}
  .product-name{font-size:13px;color:var(--text)}
  .product-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
  .badge-fruta{background:#1a3d1f;color:#6fcf8a}
  .badge-verdura{background:#0f2a3d;color:#5aade0}
  #bottombar{padding:8px 20px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;gap:20px;font-size:11px;color:var(--muted);flex-wrap:wrap}
  .legend-item{display:flex;align-items:center;gap:5px}
  .legend-dot{width:10px;height:10px;border-radius:50%}
  #stats{margin-left:auto;font-size:11px;color:var(--muted)}
  #loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:100;gap:12px}
  #loading-text{font-size:13px;color:var(--muted)}
  .spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:600px){
    #panel{width:100%;max-height:200px;border-left:none;border-top:1px solid var(--border);position:absolute;bottom:40px;left:0;right:0}
  }
</style>
</head>
<body>
<div id="app">
  <header id="topbar">
    <div id="logo">🌍 Temporada Mundial <span id="logo-sub">frutas &amp; verduras del mundo</span></div>
    <div id="slider-wrap">
      <label for="monthSlider" id="label-mes">Mes:</label>
      <input type="range" id="monthSlider" min="0" max="11" value="3" step="1"/>
      <span id="monthLabel">Abril</span>
    </div>
    <nav class="filters">
      <button class="filter-btn active" id="btnAll" onclick="setFilter('all')">Todo</button>
      <button class="filter-btn" id="btnFrutas" onclick="setFilter('fruta')">🍓 Frutas</button>
      <button class="filter-btn" id="btnVerduras" onclick="setFilter('verdura')">🥦 Verduras</button>
    </nav>
    <div id="lang-toggle">
      <button class="lang-btn active" id="btnES" onclick="setLang('es')">ES</button>
      <button class="lang-btn" id="btnEN" onclick="setLang('en')">EN</button>
    </div>
  </header>
  <main id="main">
    <div id="loading">
      <div class="spinner"></div>
      <div id="loading-text">Cargando globo...</div>
    </div>
    <div id="globeEl"></div>
    <aside id="panel">
      <div id="panel-head">
        <div id="panel-country" data-default="true">Selecciona un país</div>
        <div id="panel-count" data-default="true">Haz click en cualquier país del globo</div>
      </div>
      <div id="panel-body">
        <div id="panel-empty" style="padding:24px 16px;text-align:center;color:var(--muted);font-size:13px">
          Gira el globo y haz click en cualquier país para ver sus productos de temporada.
        </div>
      </div>
    </aside>
  </main>
  <footer id="bottombar">
    <div class="legend-item"><div class="legend-dot" style="background:#1a5c2e"></div><span class="leg-5">5+ productos</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#2d8a47"></div><span class="leg-3">3-4 productos</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#7aab84"></div><span class="leg-1">1-2 productos</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#1a1a1a"></div><span class="leg-0">Sin temporada</span></div>
    <span id="stats"></span>
  </footer>
</div>

<script src="https://unpkg.com/three@0.137.0/build/three.min.js"></script>
<script src="https://unpkg.com/globe.gl@2.26.4/dist/globe.gl.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
const T={
  es:{
    loading:'Cargando globo...',
    logoSub:'frutas &amp; verduras del mundo',
    labelMes:'Mes:',
    months:['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'],
    btnAll:'Todo',btnFrutas:'🍓 Frutas',btnVerduras:'🥦 Verduras',
    selectCountry:'Selecciona un país',
    clickHint:'Haz click en cualquier país del globo',
    emptyHint:'Gira el globo y haz click en cualquier país para ver sus productos de temporada.',
    products:n=>`${n} producto${n!==1?'s':''} en temporada`,
    inMonth:m=>`en temporada — ${m}`,
    noSeason:m=>`Sin temporada en ${m}`,
    noSeasonBody:'Sin productos de temporada este mes',
    leg5:'5+ productos',leg3:'3-4 productos',leg1:'1-2 productos',leg0:'Sin temporada',
    countries:m=>`${m} países con temporada`,
    badgeFruta:'fruta',badgeVerdura:'verdura',
    tooltipIn:n=>`${n} producto${n!==1?'s':''} en temporada`,
    tooltipNone:'Sin temporada este mes',
    countryName:d=>d.name,
  },
  en:{
    loading:'Loading globe...',
    logoSub:'fruits &amp; vegetables worldwide',
    labelMes:'Month:',
    months:['January','February','March','April','May','June','July','August','September','October','November','December'],
    btnAll:'All',btnFrutas:'🍓 Fruits',btnVerduras:'🥦 Vegetables',
    selectCountry:'Select a country',
    clickHint:'Click on any country on the globe',
    emptyHint:'Spin the globe and click on any country to see its seasonal products.',
    products:n=>`${n} product${n!==1?'s':''} in season`,
    inMonth:m=>`in season — ${m}`,
    noSeason:m=>`Out of season in ${m}`,
    noSeasonBody:'No seasonal products this month',
    leg5:'5+ products',leg3:'3-4 products',leg1:'1-2 products',leg0:'Out of season',
    countries:m=>`${m} countries in season`,
    badgeFruta:'fruit',badgeVerdura:'vegetable',
    tooltipIn:n=>`${n} product${n!==1?'s':''} in season`,
    tooltipNone:'Out of season this month',
    countryName:d=>d.name_en||d.name,
  }
};

const NUM_TO_A3={4:'AFG',8:'ALB',12:'DZA',24:'AGO',36:'AUS',40:'AUT',50:'BGD',56:'BEL',
  68:'BOL',76:'BRA',100:'BGR',116:'KHM',120:'CMR',124:'CAN',144:'LKA',152:'CHL',
  156:'CHN',170:'COL',188:'CRI',192:'CUB',203:'CZE',208:'DNK',214:'DOM',218:'ECU',
  818:'EGY',231:'ETH',246:'FIN',250:'FRA',276:'DEU',288:'GHA',320:'GTM',340:'HND',
  348:'HUN',356:'IND',360:'IDN',364:'IRN',368:'IRQ',376:'ISR',380:'ITA',392:'JPN',
  400:'JOR',398:'KAZ',404:'KEN',410:'KOR',450:'MDG',458:'MYS',484:'MEX',504:'MAR',
  508:'MOZ',104:'MMR',528:'NLD',554:'NZL',566:'NGA',578:'NOR',586:'PAK',591:'PAN',
  604:'PER',608:'PHL',616:'POL',620:'PRT',642:'ROU',643:'RUS',646:'RWA',682:'SAU',
  686:'SEN',706:'SOM',710:'ZAF',724:'ESP',752:'SWE',756:'CHE',764:'THA',792:'TUR',
  800:'UGA',804:'UKR',826:'GBR',840:'USA',858:'URY',860:'UZB',862:'VEN',704:'VNM',
  887:'YEM',894:'ZMB',716:'ZWE',788:'TUN',434:'LBY',268:'GEO',51:'ARM',31:'AZE',
  112:'BLR',854:'BFA',466:'MLI',384:'CIV',300:'GRC',191:'HRV',688:'SRB',498:'MDA',
  598:'PNG',242:'FJI',600:'PRY',388:'JAM',188:'CRI'};

let SEASONAL={}, globe=null, currentMonth=3, currentFilter='all', currentLang='es', selectedCode=null;

const t=()=>T[currentLang];

function getItems(code,month,filter){
  const d=SEASONAL[code];
  if(!d) return [];
  return d.items.filter(i=>i.m.includes(month)&&(filter==='all'||i.t===filter));
}

function getColor(count){
  if(count===0) return 'rgba(20,20,20,0.9)';
  if(count<=2) return 'rgba(90,184,112,0.75)';
  if(count<=4) return 'rgba(45,138,71,0.85)';
  return 'rgba(26,92,46,0.95)';
}

function updatePanel(code){
  const d=SEASONAL[code];
  if(!d) return;
  selectedCode=code;
  const items=getItems(code,currentMonth,currentFilter);
  const lang=t();
  const monthName=lang.months[currentMonth];
  document.getElementById('panel-country').textContent=lang.countryName(d);
  document.getElementById('panel-country').removeAttribute('data-default');
  document.getElementById('panel-count').textContent=
    items.length>0?`${lang.products(items.length)} ${lang.inMonth(monthName)}`:lang.noSeason(monthName);
  document.getElementById('panel-count').removeAttribute('data-default');
  const body=document.getElementById('panel-body');
  body.innerHTML='';
  if(items.length===0){
    body.innerHTML=`<div style="padding:24px 16px;text-align:center;color:var(--muted);font-size:13px">${lang.noSeasonBody}</div>`;
    return;
  }
  items.forEach(item=>{
    const row=document.createElement('div');
    row.className='product-row';
    const badgeLabel=item.t==='fruta'?lang.badgeFruta:lang.badgeVerdura;
    row.innerHTML=`<span class="product-name">${item.n}</span><span class="product-badge badge-${item.t}">${badgeLabel}</span>`;
    body.appendChild(row);
  });
}

function refreshGlobe(){
  if(!globe) return;
  const lang=t();
  globe.polygonsData().forEach(p=>{
    p._count=p._code?getItems(p._code,currentMonth,currentFilter).length:0;
  });
  globe.polygonCapColor(p=>getColor(p._count||0));
  globe.polygonLabel(p=>{
    const d=SEASONAL[p._code];
    if(!d) return '';
    const name=lang.countryName(d);
    return `<div style="background:#0a0f0d;border:1px solid #1a5c2e;padding:6px 10px;border-radius:6px;font-size:12px;color:#e8f5ea;white-space:nowrap">
      <strong>${name}</strong><br/>
      ${p._count>0?lang.tooltipIn(p._count):lang.tooltipNone}
    </div>`;
  });
  const withData=globe.polygonsData().filter(p=>p._count>0).length;
  document.getElementById('stats').textContent=`${lang.countries(withData)} — ${lang.months[currentMonth]}`;
}

function applyLangUI(){
  const lang=t();
  document.documentElement.lang=currentLang;
  document.getElementById('loading-text').textContent=lang.loading;
  document.getElementById('logo-sub').innerHTML=lang.logoSub;
  document.getElementById('label-mes').textContent=lang.labelMes;
  document.getElementById('monthLabel').textContent=lang.months[currentMonth];
  document.getElementById('btnAll').textContent=lang.btnAll;
  document.getElementById('btnFrutas').innerHTML=lang.btnFrutas;
  document.getElementById('btnVerduras').innerHTML=lang.btnVerduras;
  document.querySelector('.leg-5').textContent=lang.leg5;
  document.querySelector('.leg-3').textContent=lang.leg3;
  document.querySelector('.leg-1').textContent=lang.leg1;
  document.querySelector('.leg-0').textContent=lang.leg0;
  // Panel defaults
  if(document.getElementById('panel-country').hasAttribute('data-default')){
    document.getElementById('panel-country').textContent=lang.selectCountry;
  }
  if(document.getElementById('panel-count').hasAttribute('data-default')){
    document.getElementById('panel-count').textContent=lang.clickHint;
  }
  const emptyEl=document.getElementById('panel-empty');
  if(emptyEl) emptyEl.textContent=lang.emptyHint;
  // Re-render panel if a country is selected
  if(selectedCode) updatePanel(selectedCode);
}

function setLang(lang){
  currentLang=lang;
  document.getElementById('btnES').classList.toggle('active',lang==='es');
  document.getElementById('btnEN').classList.toggle('active',lang==='en');
  applyLangUI();
  refreshGlobe();
}
window.setLang=setLang;

function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  const map={all:'btnAll',fruta:'btnFrutas',verdura:'btnVerduras'};
  document.getElementById(map[f]).classList.add('active');
  refreshGlobe();
  if(selectedCode) updatePanel(selectedCode);
}
window.setFilter=setFilter;

document.getElementById('monthSlider').addEventListener('input',function(){
  currentMonth=parseInt(this.value);
  document.getElementById('monthLabel').textContent=t().months[currentMonth];
  refreshGlobe();
  if(selectedCode) updatePanel(selectedCode);
});

async function init(){
  const res=await fetch('./data/seasonal.json');
  SEASONAL=await res.json();

  const world=await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2.0.2/countries-110m.json').then(r=>r.json());
  const countries=TopoJSON.feature(world,world.objects.countries).features;

  countries.forEach(c=>{
    const code=NUM_TO_A3[parseInt(c.id)]||'';
    c._code=code;
    c._count=code?getItems(code,currentMonth,currentFilter).length:0;
  });

  const el=document.getElementById('globeEl');
  const G=Globe()(el);
  G.polygonsData(countries)
   .polygonAltitude(0.006)
   .polygonCapColor(p=>getColor(p._count||0))
   .polygonSideColor(()=>'rgba(0,0,0,0.2)')
   .polygonStrokeColor(()=>'rgba(255,255,255,0.05)')
   .polygonLabel(p=>{
     const d=SEASONAL[p._code];
     if(!d) return '';
     const lang=t();
     const name=lang.countryName(d);
     return `<div style="background:#0a0f0d;border:1px solid #1a5c2e;padding:6px 10px;border-radius:6px;font-size:12px;color:#e8f5ea;white-space:nowrap">
       <strong>${name}</strong><br/>
       ${p._count>0?lang.tooltipIn(p._count):lang.tooltipNone}
     </div>`;
   })
   .onPolygonClick(p=>{if(p._code&&SEASONAL[p._code]) updatePanel(p._code);})
   .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')
   .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
   .width(el.offsetWidth)
   .height(el.offsetHeight);

  G.controls().autoRotate=true;
  G.controls().autoRotateSpeed=0.3;
  globe=G;
  document.getElementById('loading').style.display='none';
  refreshGlobe();
  window.addEventListener('resize',()=>{G.width(el.offsetWidth);G.height(el.offsetHeight);});
}

init().catch(e=>console.error(e));
</script>
</body>
</html>
